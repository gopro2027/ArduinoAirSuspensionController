; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Please choose your device by uncommenting the appropriate line below
[platformio]
default_envs = controller_ws2p8_dev

[env]
; platform = platformio/espressif32
; platform = https://github.com/platformio/platform-espressif32.git
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip ; version number not specified
; 55.03.37 = Arduino core 3.3.7, ESP-IDF 5.5.2 https://github.com/pioarduino/platform-espressif32/releases/tag/55.03.37
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder

; fix for uploading on ws2p8b
; ESP32-S3 Waveshare boards use native USB-Serial/JTAG (not a UART bridge).
; esptool's stub flasher can drop the USB link mid-flash on Windows ("chip stopped responding");
; --no-stub uses the ROM loader instead (slower upload, reliable). Web flasher is unaffected.
; was: no upload overrides (board default 115200 + hard_reset + stub flasher)
upload_speed = 921600
board_upload.after_reset = watchdog-reset
upload_flags = --no-stub



; The framework appends its own -Os after user flags, which would silently override our -O2;
; build_unflags strips it so -O2 below is the only optimization flag on the command line.
build_unflags = -Os
build_flags =
    -Wall
    -O2 ; optimize for speed (LVGL software rendering is CPU-bound) ; was: framework default -Os
    -I include  ; Add the include/ folder to the search path, needed for lvgl 9.3+
    -D LV_CONF_INCLUDE_SIMPLE  ; Use simple include method for lv_conf.h (finds it via -I include)
    '-D BOARD_NAME="${this.board}"'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    ;'-D CORE_DEBUG_LEVEL=5'
    '-D PROJECT_IS_CONTROLLER'
    ;'-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG'
    ;'-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE'
    '-D NAVBAR_HEIGHT=56'
    ; '-D CUSTOM_CAR_IMAGE'

lib_extra_dirs = ../ESP32_SHARED_LIBS/
    

board_build.partitions = no_fs.csv ;min_spiffs.csv ;huge_app.csv
    
lib_deps =
    ;
    ; Use release/2.3 branch directly for Arduino 3.3.7 / ESP-IDF 5.5 controller init fix (PR #1090) until a stable release is released (assuming 2.3.8)
    ; See: https://github.com/h2zero/NimBLE-Arduino/pull/1090
    ; https://github.com/h2zero/NimBLE-Arduino.git#release/2.3 ; pointing to this branch directly because it has the fix for the new arduino core, but it's not in a release yet
    h2zero/NimBLE-Arduino@^2.5.0
    ;
    ;
    lvgl/lvgl@^9.4.0
    bblanchon/ArduinoJson@^7.4.2
    ;
    

; monitor_port = COM5
; upload_port = COM5


; setup per device environments

[env:controller_ws2p8_dev]
extends = env
board = esp32-s3touchlcd2p8
board_build.partitions = partitions/s3_16mb.csv
build_flags = ${env.build_flags} 
    '-D FIRMWARE_RELEASE_NAME="controller_ws2p8"'
    '-D CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1' ; Fix malloc error in Nim-BLE by making it use the SPIRAM
    '-D OTA_SUPPORTED'
lib_deps = ${env.lib_deps}
    ./device_libs/ws2p8

[env:controller_ws2p8b_dev]
extends = env
board = esp32-s3touchlcd2p8b
board_build.partitions = partitions/s3_16mb.csv
build_flags = ${env.build_flags} 
    '-D FIRMWARE_RELEASE_NAME="controller_ws2p8b"'
    '-D CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1' ; Fix malloc error in Nim-BLE by making it use the SPIRAM
    '-D OTA_SUPPORTED'
    ; RGB panel board: keep LVGL's builtin pool (so internal RAM stays free for BLE on connect),
    ; but place that pool in PSRAM and enlarge it so the 480x640 UI doesn't exhaust it (blank screen).
    ; ; was: '-D LV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB' (system malloc starved internal RAM -> BLE malloc error)
    '-D LV_MEM_POOL_PSRAM'
    '-D LV_MEM_SIZE=(512U*1024U)'
lib_deps = ${env.lib_deps}
    ./device_libs/ws2p8b

[env:controller_ws3p5_dev]
extends = env
board = esp32-s3touchlcd3p5
board_build.partitions = partitions/s3_16mb.csv
build_flags = ${env.build_flags} 
    '-D FIRMWARE_RELEASE_NAME="controller_ws3p5"'
    '-D CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1' ; Fix malloc error in Nim-BLE by making it use the SPIRAM
    '-D OTA_SUPPORTED'
lib_deps = ${env.lib_deps}
    ./device_libs/ws3p5

[env:controller_ws3p5b_dev]
extends = env
board = esp32-s3touchlcd3p5b
board_build.partitions = partitions/s3_16mb.csv
build_flags = ${env.build_flags} 
    '-D FIRMWARE_RELEASE_NAME="controller_ws3p5b"'
    '-D CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1' ; Fix malloc error in Nim-BLE by making it use the SPIRAM
    '-D OTA_SUPPORTED'
    '-D WAVESHARE_BOARD_3p5' ; unsure how necessary this is, was in shaft's pr
    '-DLV_COLOR_DEPTH=16'
    '-DLV_COLOR_SCREEN_TRANSP=0'
    '-DLV_COLOR_16_SWAP=0'
lib_deps = ${env.lib_deps}
    ./device_libs/ws3p5b

[env:controller_ws1p8knob_dev]
extends = env
board = esp32-s3knobtouchlcd1p8
board_build.partitions = partitions/s3_16mb.csv
build_flags = ${env.build_flags} 
    '-D FIRMWARE_RELEASE_NAME="controller_ws1p8knob"'
    '-D CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1' ; Fix malloc error in Nim-BLE by making it use the SPIRAM
    '-D OTA_SUPPORTED'
lib_deps = ${env.lib_deps}
    ./device_libs/ws1p8knob









; setup release envs
[env:release]
build_flags =
    '-D OFFICIAL_RELEASE'
    '-D RELEASE_VERSION=${sysenv.version_num}'
    '-D RELEASE_TAG_NAME=${sysenv.release_tag_name}'
    ; Demote serial logging in releases; -U first avoids a macro-redefinition warning vs the INFO value inherited from [env] ; was: INFO in all builds
    '-UCORE_DEBUG_LEVEL'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_WARN'

[env:controller_ws2p8_release]
extends = env:controller_ws2p8_dev
build_flags = ${env:controller_ws2p8_dev.build_flags}
    ${env:release.build_flags}


[env:controller_ws2p8b_release]
extends = env:controller_ws2p8b_dev
build_flags = ${env:controller_ws2p8b_dev.build_flags}
    ${env:release.build_flags}

[env:controller_ws3p5_release]
extends = env:controller_ws3p5_dev
build_flags = ${env:controller_ws3p5_dev.build_flags}
    ${env:release.build_flags}

[env:controller_ws3p5b_release]
extends = env:controller_ws3p5b_dev
build_flags = ${env:controller_ws3p5b_dev.build_flags}
    ${env:release.build_flags}

[env:controller_ws1p8knob_release]
extends = env:controller_ws1p8knob_dev
build_flags = ${env:controller_ws1p8knob_dev.build_flags}
    ${env:release.build_flags}